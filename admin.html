<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli | Aile Güvenlik Sistemi</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body {
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .header-controls {
            padding: 1.5rem;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .search-box {
            display: flex;
            gap: 0.75rem;
            width: 100%;
            max-width: 800px;
        }
        .map-section {
            position: relative;
            background: #000;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        .link-result {
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed var(--success);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            max-width: 800px;
        }
        .link-text {
            color: var(--text-primary);
            font-family: monospace;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .copy-btn, .sms-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .sms-btn {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        .copy-btn:hover, .sms-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        /* Dark Theme Leaflet Fix */
        .leaflet-layer, .leaflet-control-zoom-in, .leaflet-control-zoom-out, .leaflet-control-attribution {
            filter: invert(100%) hue-rotate(180deg) brightness(85%) contrast(85%);
        }
        #info-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: none;
            min-width: 200px;
        }
        .pulse-marker-icon {
            background-color: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            box-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6;
        }
    </style>
</head>
<body>
    <header class="header-controls">
        <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem;">
            <i data-lucide="eye" style="color: var(--accent-primary);"></i>
            <h1 style="font-size: 1.25rem; margin: 0; background: none; -webkit-text-fill-color: initial; color: white;">Aile Takip Sistemi</h1>
        </div>
        
        <div class="search-box">
            <input type="text" id="phone-input" class="input-field" placeholder="Telefon (05XXXXXXXXX)" style="margin-bottom: 0; flex: 1.5;">
            <input type="text" id="name-input" class="input-field" placeholder="Link Adı (Örn: Kargo Takibi)" style="margin-bottom: 0; flex: 1;">
            <button class="btn btn-primary" id="search-btn" style="width: auto; padding-left: 1.5rem; padding-right: 1.5rem;">
                <i data-lucide="zap"></i>
                Üret ve Sorgula
            </button>
        </div>

        <div id="link-result" class="link-result">
            <i data-lucide="link" style="color: var(--success); width: 18px;"></i>
            <span class="link-text" id="generated-link"></span>
            <div class="action-btns">
                <button id="copy-btn" class="copy-btn">
                    <i data-lucide="copy" style="width: 14px;"></i> Kopyala
                </button>
                <button id="sms-btn" class="sms-btn">
                    <i data-lucide="message-square" style="width: 14px;"></i> SMS Gönder
                </button>
            </div>
        </div>
    </header>

    <main class="map-section">
        <div id="map"></div>
        <div id="info-overlay">
            <div style="font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase;">Hedef Durumu</div>
            <div id="overlay-phone" style="font-weight: 700; font-size: 1rem;">-</div>
            <div id="overlay-time" style="font-size: 0.8rem; opacity: 0.7; margin: 0.4rem 0;">Bekleniyor...</div>
            <div id="overlay-status" class="status-pill status-offline">ÇEVRİMDIŞI</div>
        </div>
    </main>

    <!-- Firebase SDK V9 Modular -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import firebaseConfig from './firebase-config.js';

        lucide.createIcons();

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // UI Elements
        const phoneInput = document.getElementById('phone-input');
        const nameInput = document.getElementById('name-input');
        const searchBtn = document.getElementById('search-btn');
        const linkResult = document.getElementById('link-result');
        const generatedLink = document.getElementById('generated-link');
        const copyBtn = document.getElementById('copy-btn');
        const smsBtn = document.getElementById('sms-btn');
        
        const infoOverlay = document.getElementById('info-overlay');
        const overlayPhone = document.getElementById('overlay-phone');
        const overlayTime = document.getElementById('overlay-time');
        const overlayStatus = document.getElementById('overlay-status');

        // Initialize Map
        const map = L.map('map').setView([39.9334, 32.8597], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let activeMarker = null;
        let activeUnsubscribe = null;

        searchBtn.addEventListener('click', () => {
            const phoneNumber = phoneInput.value.trim();
            const linkName = nameInput.value.trim() || "Güvenlik Doğrulaması";
            if (!phoneNumber) return alert("Lütfen bir telefon numarası girin.");

            // 1. Link Üret
            const port = window.location.port ? ":" + window.location.port : "";
            const hostFull = window.location.protocol + "//" + window.location.hostname + port;
            const link = hostFull + window.location.pathname.replace('admin.html', 'l.html') + 
                         '?tel=' + encodeURIComponent(phoneNumber) + 
                         '&n=' + encodeURIComponent(linkName);
            
            generatedLink.innerText = link;
            linkResult.style.display = "flex";

            // 2. Firebase Dinle (onValue)
            if (activeUnsubscribe) {
                activeUnsubscribe();
            }

            infoOverlay.style.display = "block";
            overlayPhone.innerText = phoneNumber;
            overlayStatus.className = "status-pill status-offline";
            overlayStatus.innerText = "BEKLENİYOR";
            overlayTime.innerText = "Konum verisi bekleniyor...";

            activeUnsubscribe = onValue(ref(database, 'takip_listesi/' + phoneNumber), (snapshot) => {
                const data = snapshot.val();
                if (data && data.lat && data.lon) {
                    const latlng = [data.lat, data.lon];
                    
                    if (!activeMarker) {
                        const pulseIcon = L.divIcon({
                            className: 'pulse-marker-icon',
                            iconSize: [12, 12],
                            iconAnchor: [6, 6]
                        });
                        activeMarker = L.marker(latlng, { icon: pulseIcon }).addTo(map);
                    } else {
                        activeMarker.setLatLng(latlng);
                    }
                    
                    map.setView(latlng, 17);
                    activeMarker.bindPopup(`<b>${phoneNumber}</b><br>Son Güncelleme: ${data.lastSeen}`).openPopup();

                    overlayStatus.className = "status-pill status-online";
                    overlayStatus.innerText = "CANLI";
                    overlayTime.innerText = "Son görülme: " + data.lastSeen;
                }
            });
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(generatedLink.innerText);
            copyBtn.innerText = "Kopyalandı!";
            setTimeout(() => { copyBtn.innerHTML = '<i data-lucide="copy" style="width: 14px;"></i> Kopyala'; lucide.createIcons(); }, 2000);
        });

        smsBtn.addEventListener('click', () => {
            const phone = phoneInput.value.trim();
            const link = generatedLink.innerText;
            const linkName = nameInput.value.trim() || "Güvenlik Doğrulaması";
            
            if (!phone) return;

            const body = `${linkName}: ${link}`;
            window.open(`sms:${phone}?body=${encodeURIComponent(body)}`);
        });
    </script>
</body>
</html>
